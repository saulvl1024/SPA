<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SÉRÈN · Sistema (funcional)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --cream:#F7F1EC;--bg:#FBF8F5;--card:#FFFFFF;--plum:#7A5C68;--plum-dk:#5E4451;
  --blush:#D9A8A0;--blush-lt:#F2E2DE;--sage:#8A9A85;--sage-lt:#E7ECE3;--gold:#C9A66B;
  --ink:#2E2A28;--muted:#9A8E88;--line:#ECE3DB;--ok:#6F8169;--warn:#C98A4B;--bad:#C16B6B;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);font-weight:300;font-size:14px}
.serif{font-family:'Cormorant Garamond',serif}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* SIDEBAR */
.side{background:var(--card);border-right:1px solid var(--line);padding:26px 18px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;overflow:auto}
.brand{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.5rem;letter-spacing:.4em;padding:6px 12px 4px;color:var(--ink)}
.brand small{display:block;font-family:'Jost';font-size:.6rem;letter-spacing:.25em;color:var(--muted);font-weight:400;margin-top:4px}
.navg{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:18px 12px 8px}
.navi{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;color:#6B615C;cursor:pointer;font-size:.92rem;transition:.18s;margin-bottom:2px}
.navi:hover{background:var(--cream)}
.navi.active{background:var(--plum);color:#fff;box-shadow:0 10px 22px -12px var(--plum)}
.navi .ic{width:20px;text-align:center;font-size:1rem}
.side-foot{display:flex;align-items:center;gap:11px;padding:12px 12px 4px;border-top:1px solid var(--line)}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blush),var(--plum));color:#fff;display:grid;place-items:center;font-weight:500;flex:none}
.side-foot small{color:var(--muted);display:block;font-size:.72rem}
.foot-actions{display:flex;gap:8px;padding:0 12px 4px}
.reset{font-size:.72rem;color:var(--muted);cursor:pointer;margin-top:8px;text-align:center;padding:7px;border-radius:10px;border:1px solid var(--line);flex:1}
.reset:hover{color:var(--plum);background:var(--cream)}
.reset.danger:hover{color:var(--bad)}

/* MAIN */
.main{padding:26px 34px 60px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.top h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:2rem}
.top .sub{color:var(--muted);font-size:.86rem}
.search{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);padding:10px 16px;border-radius:30px;color:var(--muted);width:260px}
.search input{border:none;outline:none;background:none;font-family:inherit;font-size:.9rem;width:100%;color:var(--ink)}
.top-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:30px;font-family:inherit;font-size:.84rem;cursor:pointer;border:1px solid var(--plum);background:var(--plum);color:#fff;transition:.2s}
.btn:hover{background:var(--plum-dk)}
.btn.ghost{background:transparent;color:var(--plum)}
.btn.ghost:hover{background:var(--cream)}
.btn.sm{padding:7px 14px;font-size:.78rem}
.btn:disabled{opacity:.45;cursor:not-allowed}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:1rem}
.dateinput{padding:9px 14px;border-radius:24px;border:1px solid var(--line);background:var(--card);font-family:inherit;color:var(--ink)}

/* CARDS / GRID */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px}
.grid{display:grid;gap:18px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.kpi .lbl{color:var(--muted);font-size:.8rem}
.kpi .val{font-family:'Cormorant Garamond',serif;font-size:2.3rem;line-height:1.1;margin:6px 0 4px}
.kpi .chg{font-size:.78rem}.up{color:var(--ok)}.down{color:var(--bad)}
.kpi .pill{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:1.2rem;float:right}
.b-blush{background:var(--blush-lt)}.b-sage{background:var(--sage-lt)}.b-cream{background:var(--cream)}.b-gold{background:#F3E9D6}
.sec-title{display:flex;align-items:center;justify-content:space-between;margin:30px 0 14px}
.sec-title h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.4rem}
.link{color:var(--plum);font-size:.84rem;cursor:pointer}.link:hover{text-decoration:underline}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-weight:500;color:var(--muted);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;padding:12px 14px;border-bottom:1px solid var(--line)}
td{padding:13px 14px;border-bottom:1px solid var(--line);font-size:.9rem}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg)}
.cell-name{display:flex;align-items:center;gap:11px}
.av-sm{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:.78rem;flex:none}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.74rem}
.bg-ok{background:var(--sage-lt);color:#4f6049}.bg-warn{background:#F6E8D6;color:#9a6a30}.bg-bad{background:#F6DEDE;color:#9c4545}
.bg-plum{background:var(--blush-lt);color:var(--plum-dk)}.bg-gold{background:#F3E9D6;color:#8a6d33}

/* CHART */
.bars{display:flex;align-items:flex-end;gap:14px;height:200px;padding-top:10px}
.bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:8px;height:100%}
.bar .col{width:60%;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,var(--blush),var(--plum));min-height:2px;transition:height .4s}
.bar small{color:var(--muted);font-size:.72rem}
.progress{height:8px;border-radius:8px;background:var(--cream);overflow:hidden}
.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--blush),var(--plum))}

/* AGENDA */
.cal{display:grid;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--card)}
.cal .head{padding:12px;text-align:center;font-size:.8rem;border-bottom:1px solid var(--line);background:var(--cream)}
.cal .time{padding:10px;font-size:.72rem;color:var(--muted);border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:right}
.cal .slot{border-bottom:1px solid var(--line);border-right:1px solid var(--line);min-height:58px;padding:5px;position:relative}
.appt{border-radius:10px;padding:7px 9px;font-size:.76rem;color:#fff;line-height:1.3;cursor:pointer}
.appt b{font-weight:500;display:block}

/* POS */
.pos{display:grid;grid-template-columns:1fr 360px;gap:20px}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:24px;border:1px solid var(--line);cursor:pointer;font-size:.84rem;background:var(--card)}
.tab.active{background:var(--plum);color:#fff;border-color:var(--plum)}
.prod{cursor:pointer;text-align:left;transition:.2s;padding:16px}
.prod:hover{transform:translateY(-3px);box-shadow:0 16px 30px -20px var(--plum)}
.prod .thumb{height:60px;border-radius:12px;margin-bottom:10px;background:linear-gradient(135deg,var(--blush-lt),var(--sage-lt))}
.prod h4{font-weight:500;font-size:.92rem}.prod .pp{color:var(--plum);font-family:'Cormorant Garamond',serif;font-size:1.15rem}
.prod small{color:var(--muted)}
.cart{display:flex;flex-direction:column;height:fit-content;position:sticky;top:20px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:.88rem;gap:8px}
.cart-item small{color:var(--muted)}
.cart-item .x{cursor:pointer;color:var(--bad);font-size:1.1rem;padding:0 4px}
.tot{display:flex;justify-content:space-between;padding:6px 0;font-size:.9rem}
.tot.grand{font-family:'Cormorant Garamond',serif;font-size:1.5rem;border-top:1px solid var(--line);margin-top:8px;padding-top:14px}
.empty{color:var(--muted);text-align:center;padding:30px 0;font-size:.88rem}

/* EXPEDIENTE */
.client-head{display:flex;gap:20px;align-items:center}
.av-lg{width:78px;height:78px;border-radius:50%;background:linear-gradient(135deg,var(--blush),var(--plum));color:#fff;display:grid;place-items:center;font-size:1.7rem;font-family:'Cormorant Garamond',serif;flex:none}
.alert{background:#F9ECE8;border:1px solid #EBC9C0;color:#9c4f45;border-radius:12px;padding:12px 16px;font-size:.86rem;display:flex;gap:10px;align-items:center}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 22px 0}
.tl-item::before{content:'';position:absolute;left:-26px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--plum);border:3px solid var(--card);box-shadow:0 0 0 2px var(--blush-lt)}
.tl-date{font-size:.74rem;color:var(--muted)}
.tl-item h4{font-weight:500;margin:2px 0 4px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(46,42,40,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:22px;padding:30px;width:100%;max-width:480px;max-height:90vh;overflow:auto;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.6rem;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:6px;letter-spacing:.03em}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-family:inherit;font-size:.9rem;background:var(--bg);color:var(--ink);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--plum)}
.field textarea{min-height:80px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

/* TOAST */
.toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:400}
.toast{background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:.86rem;box-shadow:0 14px 30px -12px rgba(0,0,0,.4);animation:slide .3s ease}
.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}
@keyframes slide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

/* SEARCH DROPDOWN */
.search-wrap{position:relative}
.dropdown{position:absolute;top:50px;left:0;right:0;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 40px -20px rgba(46,42,40,.3);max-height:300px;overflow:auto;z-index:40;display:none}
.dropdown.show{display:block}
.dropdown .opt{padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);font-size:.9rem}
.dropdown .opt:last-child{border-bottom:none}
.dropdown .opt:hover{background:var(--cream)}

/* TICKET */
.ticket{font-family:'Jost',monospace;background:#fff;color:#2E2A28;width:300px;margin:0 auto;padding:6px 4px;font-size:13px;line-height:1.5}
.ticket .tt-brand{font-family:'Cormorant Garamond',serif;font-size:1.7rem;letter-spacing:.3em;text-align:center;font-weight:600}
.ticket .tt-c{text-align:center;color:#777;font-size:11px}
.ticket hr{border:none;border-top:1px dashed #bbb;margin:10px 0}
.ticket .tt-row{display:flex;justify-content:space-between;gap:8px}
.ticket .tt-row.b{font-weight:600}
.ticket .tt-line{display:flex;justify-content:space-between;margin:3px 0}
.ticket .tt-line small{color:#888;display:block}
.ticket .tt-foot{text-align:center;font-size:11px;color:#777;margin-top:12px}
@media print{
  body *{visibility:hidden}
  #ticket-print, #ticket-print *{visibility:visible}
  #ticket-print{position:absolute;left:0;top:0;width:100%;background:#fff}
  .no-print{display:none !important}
  .overlay{background:#fff !important;backdrop-filter:none}
}

/* LOCK / LOGIN */
#lock{position:fixed;inset:0;background:linear-gradient(160deg,#F7F1EC 0%,#EFE0DA 55%,#E7D3CE 100%);display:none;align-items:center;justify-content:center;z-index:300}
.lockbox{background:rgba(255,255,255,.72);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:28px;padding:38px 34px;width:340px;text-align:center;box-shadow:0 40px 90px -40px rgba(122,92,104,.5)}
.lockbox .brand{font-family:'Cormorant Garamond',serif;font-size:2rem;letter-spacing:.4em;font-weight:600;margin-bottom:6px;padding:0}
.lockbox p{color:var(--muted);font-size:.9rem;margin-bottom:4px}
.lockbox .hint{font-size:.72rem;color:var(--muted);margin-top:16px;line-height:1.6}
.dots{display:flex;gap:10px;justify-content:center;margin:22px 0 16px}
.dots span{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--plum);transition:.15s}
.dots span.on{background:var(--plum)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.keypad button{padding:15px;border-radius:14px;border:1px solid var(--line);background:var(--card);font-size:1.2rem;font-family:inherit;cursor:pointer;color:var(--ink);transition:.15s}
.keypad button:hover{background:var(--cream)}
.keypad button.ok{background:var(--plum);color:#fff;border-color:var(--plum)}
.lockbox input{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;font-size:1.2rem;text-align:center;margin:16px 0;font-family:inherit;background:var(--card)}

.mb{margin-bottom:18px}.mt{margin-top:18px}
.flex{display:flex;gap:14px}.between{justify-content:space-between}.center{align-items:center}
.muted{color:var(--muted)}.right{text-align:right}
.mtop{display:none}
.side-backdrop{display:none}
@media(max-width:980px){
  .app{display:block}
  .mtop{display:flex;align-items:center;gap:14px;padding:13px 18px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:60}
  .mtop .brand{font-size:1.25rem;padding:0;letter-spacing:.3em}
  .ham{font-size:1.5rem;background:none;border:none;cursor:pointer;color:var(--ink);line-height:1}
  .side{position:fixed;top:0;left:0;bottom:0;width:262px;height:100vh;transform:translateX(-100%);transition:transform .25s;z-index:120;box-shadow:0 0 50px rgba(0,0,0,.25)}
  .side.open{transform:none}
  .side-backdrop{display:none;position:fixed;inset:0;background:rgba(46,42,40,.4);z-index:110}
  .side-backdrop.show{display:block}
  .main{padding:18px 16px 70px}
  .top h1{font-size:1.6rem}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g2,.g3{grid-template-columns:1fr!important}
  .pos{grid-template-columns:1fr}
  .cart{position:static}
  .card{overflow-x:auto}
  table{min-width:520px}
  .cal{min-width:640px}
  .search{width:100%}
  .top-actions{width:100%}
  .top-actions .btn,.top-actions .dateinput{flex:1;justify-content:center}
}
@media(max-width:560px){.g4{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="lock"></div>

<div class="app" id="app" style="display:none">
  <div class="mtop"><button class="ham" data-action="open-nav">☰</button><div class="brand">SÉRÈN</div></div>
  <aside class="side">
    <div class="brand">SÉRÈN<small>Sistema de gestión</small></div>
    <div class="navg">Operación</div>
    <div class="navi active" data-v="dashboard"><span class="ic">◇</span> Dashboard</div>
    <div class="navi" data-v="agenda"><span class="ic">◷</span> Agenda</div>
    <div class="navi" data-v="clientes"><span class="ic">♡</span> Clientes</div>
    <div class="navi" data-v="pos"><span class="ic">▣</span> Punto de venta</div>
    <div class="navi" data-v="caja"><span class="ic">▦</span> Caja / Corte</div>
    <div class="navg">Servicios</div>
    <div class="navi" data-v="paquetes"><span class="ic">❋</span> Paquetes</div>
    <div class="navi" data-v="expediente"><span class="ic">✚</span> Expediente</div>
    <div class="navi" data-v="inventario"><span class="ic">⬡</span> Inventario</div>
    <div class="navg" data-admin="1">Negocio (admin)</div>
    <div class="navi" data-v="reportes" data-admin="1"><span class="ic">▤</span> Reportes</div>
    <div class="navi" data-v="lealtad" data-admin="1"><span class="ic">✦</span> Lealtad</div>
    <div class="navi" data-v="comisiones" data-admin="1"><span class="ic">$</span> Comisiones</div>
    <div style="margin-top:auto">
      <div class="side-foot" id="sidefoot"></div>
      <div class="foot-actions">
        <div class="reset" data-go="caja">▦ Corte</div>
        <div class="reset" data-action="lock">⎘ Bloquear</div>
      </div>
      <div class="reset danger" data-action="reset" style="margin:0 12px">⟳ Reiniciar datos de demo</div>
    </div>
  </aside>
  <main class="main" id="content"></main>
</div>
<div class="side-backdrop" id="backdrop"></div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toasts" id="toasts"></div>

<script>
/* ============ HELPERS ============ */
const $=s=>document.querySelector(s);
const money=n=>'$'+Math.round(n).toLocaleString('es-MX');
const uid=()=>Math.random().toString(36).slice(2,9);
const initials=n=>n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
const COLORS=['var(--plum)','var(--blush)','var(--sage)','var(--gold)'];
const colorFor=id=>COLORS[(''+id).split('').reduce((a,c)=>a+c.charCodeAt(0),0)%COLORS.length];
const todayISO=()=>new Date().toISOString().slice(0,10);
const MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const hhmm=ts=>new Date(ts).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
function toast(msg,type=''){const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;$('#toasts').appendChild(t);setTimeout(()=>t.remove(),3000);}
function addMonths(iso,m){const d=new Date(iso);d.setMonth(d.getMonth()+m);return d.toISOString().slice(0,10);}
function fmtDate(iso){const d=new Date(iso+'T00:00');return d.getDate()+' '+MONTHS[d.getMonth()].toLowerCase()+' '+d.getFullYear();}

/* ============ DATA STORE ============ */
const KEY='seren_spa_v2';
let DB;
function seed(){
  const staff=[
    {id:'u1',name:'Saúl Valdez',pin:'1111',role:'admin'},
    {id:'u2',name:'Karla Núñez',pin:'2222',role:'empleada'},
    {id:'u3',name:'Lucía Rivera',pin:'3333',role:'empleada'},
    {id:'u4',name:'Daniela Mora',pin:'4444',role:'empleada'},
  ];
  const specialists=[
    {id:'sp1',name:'Lucía Rivera',specialty:'Faciales',rate:0.12},
    {id:'sp2',name:'Daniela Mora',specialty:'Masajes',rate:0.12},
    {id:'sp3',name:'Sofía Torres',specialty:'Manos & pies',rate:0.10},
    {id:'sp4',name:'Valeria Cruz',specialty:'Corporales',rate:0.10},
  ];
  const supplies=[
    {id:'su1',name:'Mascarilla hidratante',cat:'Facial',unit:'pza',stock:3,min:10},
    {id:'su2',name:'Sérum vitamina C',cat:'Facial',unit:'ml',stock:120,min:200},
    {id:'su3',name:'Aceite de almendras',cat:'Masaje',unit:'ml',stock:380,min:500},
    {id:'su4',name:'Gel conductor RF',cat:'Aparatología',unit:'ml',stock:900,min:300},
    {id:'su5',name:'Guantes nitrilo',cat:'General',unit:'par',stock:40,min:60},
    {id:'su6',name:'Toallas desechables',cat:'General',unit:'pza',stock:240,min:100},
  ];
  const services=[

const byId=(arr,id)=>arr.find(x=>x.id===id);

/* ============ LOCK / LOGIN ============ */
let lockPin='', lockStep='pin', pendingUser=null;
function renderLock(){
  $('#app').style.display='none';
  const L=$('#lock'); L.style.display='flex';
  if(lockStep==='fondo'){
    L.innerHTML=`<div class="lockbox"><div class="brand">SÉRÈN</div>
      <p>Hola, ${pendingUser.name.split(' ')[0]}</p>
      <p class="hint">Abrir caja — fondo inicial (efectivo con el que inicia la caja)</p>
      <input id="fondo-in" type="number" value="1000" inputmode="numeric">
      <button class="btn" style="width:100%;justify-content:center" onclick="openCaja()">Abrir caja</button>
      <p class="hint" style="cursor:pointer" onclick="lockStep='pin';lockPin='';renderLock()">← volver</p>
    </div>`;
    setTimeout(()=>{const f=$('#fondo-in');if(f)f.focus();},50);
    return;
  }
  L.innerHTML=`<div class="lockbox"><div class="brand">SÉRÈN</div>
    <p>Ingresa tu clave de acceso</p>
    <div class="dots" id="lockdots"></div>
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="lockKey('${n}')">${n}</button>`).join('')}
      <button onclick="lockDel()">⌫</button>
      <button onclick="lockKey('0')">0</button>
      <button class="ok" onclick="lockSubmit()">✓</button>
    </div>
    <p class="hint">Demo · Admin: <b>1111</b> · Empleadas: 2222 / 3333 / 4444</p>
  </div>`;
  updateLockDots();
}
function updateLockDots(){const d=$('#lockdots');if(d)d.innerHTML=Array(Math.max(4,lockPin.length)).fill(0).map((_,i)=>`<span class="${i<lockPin.length?'on':''}"></span>`).join('');}
function lockKey(n){if(lockPin.length<6){lockPin+=n;updateLockDots();}if(lockPin.length>=4){const u=DB.staff.find(s=>s.pin===lockPin);if(u)lockSubmit();}}
function lockDel(){lockPin=lockPin.slice(0,-1);updateLockDots();}
function lockSubmit(){
  const u=DB.staff.find(s=>s.pin===lockPin);
  if(!u){toast('Clave incorrecta','bad');lockPin='';updateLockDots();return;}
  pendingUser=u;
  if(!DB.caja){lockStep='fondo';renderLock();}
  else{finishLogin(u);}
}
function openCaja(){
  const f=+($('#fondo-in').value)||0;
  DB.caja={id:uid(),userId:pendingUser.id,openedAt:Date.now(),fondo:f,salesIds:[]};
  finishLogin(pendingUser);
  toast('Caja abierta · fondo '+money(f),'ok');
}
function finishLogin(u){
  DB.currentUserId=u.id; DB.locked=false; lockPin=''; lockStep='pin'; pendingUser=null;
  save(); $('#lock').style.display='none'; render();
  toast('Bienvenida, '+u.name.split(' ')[0],'ok');
}

/* ============ ROUTER ============ */
let current='dashboard';
function render(){
  if(!DB.currentUserId||DB.locked){renderLock();return;}
  $('#lock').style.display='none'; $('#app').style.display='grid';
  if(!isAdmin()&&['reportes','lealtad','comisiones'].includes(current))current='dashboard';
  $('#content').innerHTML=(VIEWS[current]||(()=>'<div class="empty">—</div>'))();
  document.querySelectorAll('.navi').forEach(n=>n.classList.toggle('active',n.dataset.v===current));
  document.querySelectorAll('[data-admin]').forEach(n=>n.style.display=isAdmin()?'':'none');
  renderSideFoot();
  window.scrollTo({top:0,behavior:'smooth'});
}
function go(v){current=v;render();}
function renderSideFoot(){
  const u=currentUser();if(!u)return;
  $('#sidefoot').innerHTML=`<div class="avatar">${initials(u.name)}</div><div style="flex:1"><div style="font-size:.86rem">${u.name}</div><small>${u.role==='admin'?'Administrador':'Empleada'}${DB.caja?' · caja abierta':' · sin caja'}</small></div>`;
}

VIEWS.agenda=function(){
  const t=todayISO();
  const appts=DB.appointments.filter(a=>a.date===t);
  const times=[];for(let h=9;h<21;h++){const p=String(h).padStart(2,'0');times.push(p+':00');times.push(p+':30');}
  const slotFor=tm=>{const[h,m]=tm.split(':').map(Number);return String(h).padStart(2,'0')+':'+(m<30?'00':'30');};
  const cols=DB.specialists;
  const grid=`grid-template-columns:64px repeat(${cols.length},1fr)`;
  let cells='';
  cells+=`<div class="head"></div>`+cols.map(sp=>`<div class="head"><b>${sp.name.split(' ')[0]}</b><br><small class="muted">${sp.specialty}</small></div>`).join('');
  times.forEach(tm=>{
    cells+=`<div class="time">${tm}</div>`;
    cols.forEach(sp=>{
      const a=appts.find(x=>x.specialistId===sp.id&&slotFor(x.time)===tm);
      if(a){const c=byId(DB.clients,a.clientId),sv=byId(DB.services,a.serviceId);
        cells+=`<div class="slot"><div class="appt" style="background:${colorFor(sp.id)}" data-action="open-appt" data-id="${a.id}"><b>${a.time} · ${c.name.split(' ')[0]}</b>${sv?sv.name:''}</div></div>`;}
      else cells+=`<div class="slot"></div>`;

  return `${topBar('Agenda',new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'}),

VIEWS.reportes=function(){
  const y=new Date().getFullYear();
  const byM=Array(12).fill(0);
  DB.sales.forEach(s=>{const d=new Date(s.date+'T00:00');if(d.getFullYear()===y)byM[d.getMonth()]+=s.total;});
  const maxM=Math.max(...byM,1);
  const upto=new Date().getMonth();
  const totalYear=byM.reduce((a,b)=>a+b,0);
  const mix={};let totalServices=0;
  DB.sales.forEach(s=>s.items.forEach(i=>{if(i.type==='servicio'){mix[i.refId]=(mix[i.refId]||0)+(i.qty||1);totalServices+=(i.qty||1);}}));
  const topServ=Object.entries(mix).map(([id,n])=>({name:(byId(DB.services,id)||{name:'Servicio'}).name,n})).sort((a,b)=>b.n-a.n).slice(0,5);
  const bySp={};
  DB.sales.forEach(s=>s.items.forEach(i=>{if(i.specialistId)bySp[i.specialistId]=(bySp[i.specialistId]||0)+i.price*(i.qty||1);}));
  const topSp=Object.entries(bySp).map(([id,v])=>({name:(byId(DB.specialists,id)||{name:'—'}).name,v})).sort((a,b)=>b.v-a.v).slice(0,5);
  const bars=byM.slice(0,upto+1).map((v,i)=>`<div class="bar"><div class="col" style="height:${Math.max(4,v/maxM*100)}%"></div><small>${MONTHS[i]}</small></div>`).join('');
  return `${topBar('Reportes y analíticas','Desempeño del negocio · '+y,
    `<button class="btn ghost" data-action="export-reportes">⬇ Excel</button>`)}
  <div class="grid g4 mb">
    <div class="card kpi"><div class="lbl">Ventas del año</div><div class="val">${money(totalYear)}</div></div>
    <div class="card kpi"><div class="lbl">Tickets totales</div><div class="val">${DB.sales.length}</div></div>
    <div class="card kpi"><div class="lbl">Clientes</div><div class="val">${DB.clients.length}</div></div>
    <div class="card kpi"><div class="lbl">Servicios vendidos</div><div class="val">${totalServices}</div></div>
  </div>
  <div class="card mb"><h2 class="serif mb" style="font-size:1.3rem">Ingresos por mes</h2><div class="bars">${bars}</div></div>
  <div class="grid g2" style="grid-template-columns:1fr 1fr">
    <div class="card"><h2 class="serif mb" style="font-size:1.3rem">Servicios más vendidos</h2><table><tbody>${topServ.length?topServ.map(s=>`<tr><td>${s.name}</td><td class="right"><b>${s.n}</b></td></tr>`).join(''):'<tr><td class="empty">Aún sin datos</td></tr>'}</tbody></table></div>
    <div class="card"><h2 class="serif mb" style="font-size:1.3rem">Top especialistas (ventas)</h2><table><tbody>${topSp.length?topSp.map(s=>`<tr><td><div class="cell-name">${avatar(s.name)}${s.name}</div></td><td class="right"><b>${money(s.v)}</b></td></tr>`).join(''):'<tr><td class="empty">Aún sin datos</td></tr>'}</tbody></table></div>
  </div>`;
};

VIEWS.comisiones=function(){
  const y=new Date().getFullYear(),mo=new Date().getMonth();
  const agg={};
  DB.sales.forEach(s=>{const d=new Date(s.date+'T00:00');if(d.getFullYear()!==y||d.getMonth()!==mo)return;
    s.items.forEach(i=>{if(!i.specialistId||!i.price)return;agg[i.specialistId]=agg[i.specialistId]||{sales:0};agg[i.specialistId].sales+=i.price*(i.qty||1);});});
  const rows=DB.specialists.map(sp=>{const sales=(agg[sp.id]||{}).sales||0;const com=sales*sp.rate;return {sp,sales,com};});
  const totalCom=rows.reduce((a,r)=>a+r.com,0);
  const active=rows.filter(r=>r.sales>0).length;
  return `${topBar('Comisiones','Periodo: '+MONTHS[mo]+' '+y,
    `<button class="btn ghost" data-action="commission-rules">Configurar reglas</button>`)}

    <div class="card kpi"><div class="lbl">% promedio</div><div class="val">${Math.round(DB.specialists.reduce((a,s)=>a+s.rate,0)/DB.specialists.length*100)}%</div></div>

  ${rows.map(r=>`<tr><td><div class="cell-name">${avatar(r.sp.name)}${r.sp.name}</div></td><td>${r.sp.specialty}</td><td>${money(r.sales)}</td><td>${Math.round(r.sp.rate*100)}%</td><td><b>${money(r.com)}</b></td></tr>`).join('')}

/* ============ POS LOGIC ============ */
function posAdd(type,id){
  if(type==='servicio'){const s=byId(DB.services,id);
    const cp=POS.clientId?DB.clientPackages.find(p=>p.clientId===POS.clientId&&p.serviceId===id&&p.remaining>0):null;
    if(cp){POS.items.push({type,refId:id,name:s.name,price:0,qty:1,sub:'Paquete · sesión incluida',specialistId:null,packageId:cp.id});}
    else POS.items.push({type,refId:id,name:s.name,price:s.price,qty:1,sub:'Servicio',specialistId:DB.specialists[0].id});
  }
  else if(type==='producto'){const p=byId(DB.products,id);if(p.stock<=0){toast('Sin stock','bad');return;}POS.items.push({type,refId:id,name:p.name,price:p.price,qty:1,sub:'Producto'});}
  else if(type==='paquete'){const p=byId(DB.packages,id);POS.items.push({type,refId:id,name:'Paquete '+p.name,price:p.price,qty:1,sub:p.sessions+' sesiones',sessions:p.sessions,validity:p.validity});}
  else if(type==='anticipo'){const v=+($('#anticipo')?.value)||0;if(v<=0){toast('Monto inválido','bad');return;}POS.items.push({type,refId:null,name:'Anticipo',price:v,qty:1,sub:'Saldo a favor'});}
  render();
}
function posCheckout(){
  if(!DB.caja){toast('Abre la caja para cobrar','bad');return;}
  const c=byId(DB.clients,POS.clientId);
  const sub=POS.items.reduce((a,i)=>a+i.price*i.qty,0);
  const disc=sub*POS.discountPct/100;
  const creditUsed=POS.useCredit?Math.min(c.credit,sub-disc):0;
  const total=sub-disc-creditUsed;const pts=Math.round(total/10);
  const ticketNo=DB.seq;
  POS.items.forEach(i=>{
    if(i.type==='producto'){const p=byId(DB.products,i.refId);if(p)p.stock=Math.max(0,p.stock-i.qty);}
    if(i.type==='servicio'&&i.packageId){const cp=byId(DB.clientPackages,i.packageId);if(cp&&cp.remaining>0)cp.remaining--;}
    if(i.type==='servicio'&&!i.packageId){const sv=byId(DB.services,i.refId);if(sv&&sv.supplies)sv.supplies.forEach(r=>{const su=byId(DB.supplies,r.id);if(su)su.stock=Math.max(0,su.stock-r.qty);});}
    if(i.type==='paquete'){DB.clientPackages.push({id:'cp'+uid(),clientId:POS.clientId,packageId:i.refId,serviceId:DB.services[0].id,total:i.sessions,remaining:i.sessions,expires:addMonths(todayISO(),i.validity)});}
    if(i.type==='anticipo'){c.credit+=i.price;}
  });
  if(creditUsed>0)c.credit=Math.max(0,c.credit-creditUsed);
  c.points+=pts;
  const items=POS.items.map(i=>({type:i.type,refId:i.refId,name:i.name,price:i.price,qty:i.qty,specialistId:i.specialistId||null,fromPackage:!!i.packageId}));
  const method=POS.payment;
  const sale={id:uid(),ticketNo,clientId:POS.clientId,cashierId:DB.currentUserId,sessionId:DB.caja.id,date:todayISO(),items,subtotal:sub,discount:disc,creditUsed,total,paymentMethod:method,points:pts};
  DB.sales.push(sale);DB.caja.salesIds.push(sale.id);DB.seq++;
  const ticket={ticketNo,clientName:c.name,cashier:currentUser().name,method,date:new Date(),items,sub,disc,creditUsed,total,pts,pointsBalance:c.points};
  POS={clientId:null,items:[],discountPct:0,tab:'servicio',useCredit:false,payment:'efectivo'};
  save();render();toast('Venta cobrada: '+money(total)+' · +'+pts+' pts','ok');
  showTicket(ticket);
}

/* ============ EXPORT EXCEL ============ */
function dl(filename,sheets){
  if(window.XLSX){
    const wb=XLSX.utils.book_new();
    sheets.forEach(s=>{const ws=XLSX.utils.aoa_to_sheet(s.rows);XLSX.utils.book_append_sheet(wb,ws,s.name.slice(0,31));});
    XLSX.writeFile(wb,filename+'.xlsx');toast('Excel descargado','ok');
  }else{
    const rows=sheets[0].rows.map(r=>r.map(c=>`"${(''+c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const b=new Blob(['﻿'+rows],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=filename+'.csv';a.click();toast('CSV descargado','ok');
  }
}
function stockLabel(x){return x.stock<=x.min/2?'Crítico':x.stock<=x.min?'Bajo':'Óptimo';}
function exportInventario(){
  const sup=[['Insumo','Categoría','Unidad','Stock','Mínimo','Estado'],...DB.supplies.map(x=>[x.name,x.cat,x.unit,x.stock,x.min,stockLabel(x)])];
  const prod=[['Producto','Precio','Stock','Mínimo','Estado'],...DB.products.map(x=>[x.name,x.price,x.stock,x.min,stockLabel(x)])];
  dl('inventario_'+todayISO(),[{name:'Insumos',rows:sup},{name:'Productos',rows:prod}]);
}
function exportReportes(){
  const y=new Date().getFullYear();const byM=Array(12).fill(0);
  DB.sales.forEach(s=>{const d=new Date(s.date+'T00:00');if(d.getFullYear()===y)byM[d.getMonth()]+=s.total;});
  const months=[['Mes','Ingresos'],...byM.map((v,i)=>[MONTHS[i],v])];
  const mix={};DB.sales.forEach(s=>s.items.forEach(i=>{if(i.type==='servicio')mix[i.refId]=(mix[i.refId]||0)+(i.qty||1);}));
  const serv=[['Servicio','Cantidad'],...Object.entries(mix).map(([id,n])=>[(byId(DB.services,id)||{name:id}).name,n]).sort((a,b)=>b[1]-a[1])];
  const bySp={};DB.sales.forEach(s=>s.items.forEach(i=>{if(i.specialistId)bySp[i.specialistId]=(bySp[i.specialistId]||0)+i.price*(i.qty||1);}));
  const sp=[['Especialista','Ventas'],...Object.entries(bySp).map(([id,v])=>[(byId(DB.specialists,id)||{name:id}).name,v]).sort((a,b)=>b[1]-a[1])];
  dl('reportes_'+y,[{name:'Ingresos por mes',rows:months},{name:'Servicios',rows:serv},{name:'Especialistas',rows:sp}]);
}
function exportSales(){
  const src=(cajaShowAll?[...DB.sales]:DB.sales.filter(s=>s.date===cajaDate)).sort((a,b)=>b.date.localeCompare(a.date));
  const rows=[['Fecha','Ticket','Cliente','Cajera','Método','Subtotal','Descuento','Saldo aplicado','Total','Puntos']];
  src.forEach(s=>{const c=byId(DB.clients,s.clientId),u=byId(DB.staff,s.cashierId);rows.push([s.date,s.ticketNo,c?c.name:'',u?u.name:'',s.paymentMethod,s.subtotal,s.discount,s.creditUsed||0,s.total,s.points]);});
  dl('ventas_'+(cajaShowAll?'todas':cajaDate),[{name:'Ventas',rows}]);
}
function exportCortes(){
  const rows=[['Fecha','Cajera','Fondo','Efectivo','Tarjeta','Transferencia','Total ventas','Tickets','Efectivo esperado','Efectivo contado','Diferencia']];
  [...DB.cashCuts].sort((a,b)=>b.closedAt-a.closedAt).forEach(c=>rows.push([c.date,c.userName,c.fondo,c.byMethod.efectivo,c.byMethod.tarjeta,c.byMethod.transferencia,c.total,c.tickets,c.esperadoEfectivo,c.contado,c.diff]));
  dl('cortes_caja',[{name:'Cortes',rows}]);
}

/* ============ MOBILE NAV ============ */
function openNav(){const s=document.querySelector('.side');if(s)s.classList.add('open');const b=$('#backdrop');if(b)b.classList.add('show');}
function closeNav(){const s=document.querySelector('.side');if(s)s.classList.remove('open');const b=$('#backdrop');if(b)b.classList.remove('show');}

/* ============ EVENT DELEGATION ============ */
document.addEventListener('click',e=>{
  if(e.target.id==='backdrop'){closeNav();return;}
  const nav=e.target.closest('.navi');if(nav){go(nav.dataset.v);closeNav();return;}
  const goEl=e.target.closest('[data-go]');if(goEl){go(goEl.dataset.go);closeNav();return;}
  const tab=e.target.closest('[data-action="pos-tab"]');if(tab){POS.tab=tab.dataset.tab;render();return;}
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset.action,id=el.dataset.id;
  const map={
    'reset':()=>{if(confirm('¿Reiniciar todos los datos a la demo inicial? Se cerrará la sesión.'))resetDB();},
    'lock':()=>{DB.locked=true;lockPin='';lockStep='pin';save();render();},
    'open-nav':openNav,
    'export-inventario':exportInventario,
    'export-reportes':exportReportes,
    'export-sales':exportSales,
    'export-cortes':exportCortes,
    'close':closeModal,
    'new-client':()=>openModal(clientForm(null)),
    'edit-client':()=>openModal(clientForm(byId(DB.clients,id))),
    'save-client':()=>saveClient(id),
    'view-expediente':()=>{expedienteClient=id;go('expediente');},
    'pick-expediente':()=>{expedienteClient=id;render();},
    'new-appointment':()=>openModal(apptForm()),
    'save-appt':saveAppt,
    'open-appt':()=>openModal(apptDetail(id)),
    'save-appt-status':()=>saveApptStatus(id),
    'sell-package':()=>sellPackage(id),
    'confirm-package':()=>confirmPackage(id),
    'use-session':()=>{const cp=byId(DB.clientPackages,id);if(cp&&cp.remaining>0){cp.remaining--;save();render();toast('Sesión descontada ('+cp.remaining+' restantes)','ok');}},
    'add-note':()=>openModal(noteForm(id)),
    'save-note':()=>saveNote(id),
    'add-stock':()=>openModal(stockForm(id,el.dataset.kind)),
    'save-stock':()=>saveStock(id,el.dataset.kind),
    'new-supply':()=>{if(!isAdmin()){toast('Solo el administrador','bad');return;}openModal(supplyForm());},
    'save-supply':saveSupply,
    'new-product':()=>{if(!isAdmin()){toast('Solo el administrador','bad');return;}openModal(productForm());},
    'save-product':saveProduct,
    'edit-item':()=>{if(!isAdmin()){toast('Solo el administrador','bad');return;}openModal(itemForm(id,el.dataset.kind));},
    'save-item':()=>saveItem(id,el.dataset.kind),
    'pos-client':posClientPicker,
    'set-pos-client':()=>{POS.clientId=$('#pos-client-sel').value;closeModal();render();},
    'pos-add':()=>posAdd(el.dataset.type,id),
    'pos-remove':()=>{POS.items.splice(+el.dataset.idx,1);render();},
    'pos-checkout':posCheckout,
    'do-corte':doCorte,
    'confirm-corte':confirmCorte,
    'view-corte':()=>showCorteTicket(byId(DB.cashCuts,id)),
    'print-date-corte':()=>showCorteTicket(corteForDate(cajaDate)),
    'commission-rules':()=>toast('Configuración de reglas: próximamente'),
  };
  if(map[a])map[a]();
});
function filterClients(q){q=(q||'').trim().toLowerCase();document.querySelectorAll('#content tbody tr[data-name]').forEach(tr=>{tr.style.display=tr.dataset.name.includes(q)?'':'none';});}
function expSearch(q){const box=$('#exp-results');if(!box)return;q=(q||'').trim().toLowerCase();
  const list=DB.clients.filter(c=>c.name.toLowerCase().includes(q)).slice(0,8);
  box.innerHTML=list.length?list.map(c=>`<div class="opt" data-action="pick-expediente" data-id="${c.id}">${avatar(c.name)}${c.name}<span class="muted" style="margin-left:auto">${c.tag}</span></div>`).join(''):'<div class="opt muted">Sin resultados</div>';
  box.classList.add('show');}
document.addEventListener('click',e=>{const w=e.target.closest('.search-wrap');if(!w){const b=$('#exp-results');if(b)b.classList.remove('show');}});

/* ============ BOOT ============ */
load();render();
</script>
